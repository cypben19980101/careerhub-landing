<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>職域所 CRAFT hub | 讓助人者的專業微光，匯聚成塔</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        forest: '#2C4C3B', /* 深林綠：專業的厚度、沉穩、標題與主背景 */
                        clay: '#C67C56',   /* 陶土暖棕：輔助圖形、強調色、按鈕 */
                        gold: '#E8C478',   /* 微光金：初心、點綴、高光處 */
                        rice: '#F7F5F0',   /* 米宣白：網站背景、紙張底色 */
                    },
                    fontFamily: {
                        sans: ['"Noto Sans TC"', 'sans-serif'],
                        serif: ['"Noto Serif TC"', 'serif'],
                    }
                }
            }
        }
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Noto+Serif+TC:wght@500;700&display=swap" rel="stylesheet">
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        /* 強制使用米宣白作為基底，文字使用深林綠，避免純黑與純白 */
        body { 
            background-color: #F7F5F0; 
            color: #2C4C3B; 
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }
        /* 隱藏原生捲軸，讓畫面更乾淨 */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #F7F5F0; }
        ::-webkit-scrollbar-thumb { background: #C67C56; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #2C4C3B; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- 導覽列組件 ---
        const Navbar = () => {
            return (
                <nav className="sticky top-0 z-50 bg-rice border-b border-forest/10 shadow-sm">
                    <div className="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
                        <div className="flex items-center gap-3 cursor-pointer">
                            {/* Logo 意象：微光與編織 */}
                            <div className="w-10 h-10 rounded-full border-2 border-forest flex items-center justify-center bg-forest text-gold font-serif font-bold text-xl">
                                C
                            </div>
                            <span className="font-serif font-bold text-2xl tracking-wide text-forest">職域所 <span className="text-sm font-sans font-normal opacity-80">CRAFT hub</span></span>
                        </div>
                        <div className="hidden md:flex gap-8 text-forest font-medium">
                            <a href="#about" className="hover:text-clay transition-colors duration-300">關於我們</a>
                            <a href="#ior" className="hover:text-clay transition-colors duration-300">I.O.R 成長飛輪</a>
                            <a href="#program" className="hover:text-clay transition-colors duration-300">微光陪跑計畫</a>
                        </div>
                        <button className="bg-clay text-rice px-6 py-2 rounded-full font-medium hover:bg-forest transition-colors duration-300 shadow-md">
                            加入社群
                        </button>
                    </div>
                </nav>
            );
        };

        // --- 首頁主視覺區塊 (Hero) ---
        const Hero = () => {
            return (
                <section className="bg-forest text-rice relative overflow-hidden">
                    <div className="absolute inset-0 opacity-10" style={{ backgroundImage: 'radial-gradient(#E8C478 1px, transparent 1px)', backgroundSize: '30px 30px' }}></div>
                    <div className="max-w-5xl mx-auto px-6 py-24 md:py-32 relative z-10 flex flex-col items-center text-center">
                        <h2 className="text-gold font-serif text-lg md:text-xl mb-4 tracking-widest">
                            — 專為職涯諮詢師打造的實戰行會 —
                        </h2>
                        <h1 className="text-4xl md:text-6xl font-serif font-bold leading-tight mb-8">
                            讓助人者的專業微光<br />
                            <span className="text-gold">匯聚成塔</span>
                        </h1>
                        <p className="text-rice/80 md:text-lg max-w-2xl font-light leading-relaxed mb-10">
                            我們始終相信，諮詢不只是一項技術，更是一門需要時間「熟成」的專業。
                            在這裡，我們不教你怎麼過度包裝，而是帶你打磨出屬於自己的諮詢風格與方法論，
                            讓紮實的專業底蘊，成為你面對個案時最大的底氣。
                        </p>
                        <div className="flex gap-4">
                            <button className="bg-clay text-rice px-8 py-3 rounded-full font-medium text-lg hover:bg-gold hover:text-forest transition-all duration-300 shadow-lg transform hover:-translate-y-1">
                                探索微光實戰陪跑計畫
                            </button>
                        </div>
                    </div>
                </section>
            );
        };

        // --- 痛點與使命區塊 ---
        const PainPoints = () => {
            return (
                <section id="about" className="py-20 bg-rice">
                    <div className="max-w-6xl mx-auto px-6">
                        <div className="text-center mb-16">
                            <h3 className="text-3xl font-serif font-bold text-forest mb-4">拿到了證照，然後呢？</h3>
                            <div className="w-16 h-1 bg-gold mx-auto rounded-full mb-6"></div>
                            <p className="text-forest/80 max-w-2xl mx-auto leading-relaxed">
                                取得 CDA 等專業證照，卻發現這只是另一個焦慮的開始？我們深知你正經歷的「證照後斷層」。
                            </p>
                        </div>

                        <div className="grid md:grid-cols-3 gap-8">
                            {/* Card 1 */}
                            <div className="bg-white/50 border border-forest/10 p-8 rounded-2xl shadow-sm hover:shadow-md transition-shadow">
                                <div className="w-12 h-12 bg-forest/10 rounded-full flex items-center justify-center mb-6 border border-forest/20">
                                    <span className="text-forest text-xl font-bold">1</span>
                                </div>
                                <h4 className="text-xl font-bold text-forest mb-3">實戰的焦慮</h4>
                                <p className="text-forest/70 text-sm leading-relaxed">
                                    剛拿到證照，充滿熱情卻不知從何開始，缺乏跨出第一步的具體「實戰地圖」，怕自己給錯建議誤人子弟。
                                </p>
                            </div>
                            {/* Card 2 */}
                            <div className="bg-white/50 border border-forest/10 p-8 rounded-2xl shadow-sm hover:shadow-md transition-shadow">
                                <div className="w-12 h-12 bg-clay/10 rounded-full flex items-center justify-center mb-6 border border-clay/20">
                                    <span className="text-clay text-xl font-bold">2</span>
                                </div>
                                <h4 className="text-xl font-bold text-forest mb-3">孤島的無力</h4>
                                <p className="text-forest/70 text-sm leading-relaxed">
                                    獨自接案感到孤單與自我懷疑，遇到棘手的真實個案無人討論與指引，只能自己默默內耗。
                                </p>
                            </div>
                            {/* Card 3 */}
                            <div className="bg-white/50 border border-forest/10 p-8 rounded-2xl shadow-sm hover:shadow-md transition-shadow">
                                <div className="w-12 h-12 bg-gold/20 rounded-full flex items-center justify-center mb-6 border border-gold/40">
                                    <span className="text-gold text-xl font-bold">3</span>
                                </div>
                                <h4 className="text-xl font-bold text-forest mb-3">學分與現實焦慮</h4>
                                <p className="text-forest/70 text-sm leading-relaxed">
                                    換證期限逐漸逼近，面對龐大的繼續教育學分（CEP）感到焦慮，不知道去哪找案源維持生計。
                                </p>
                            </div>
                        </div>
                    </div>
                </section>
            );
        };

        // --- I.O.R 飛輪區塊 ---
        const Flywheel = () => {
            return (
                <section id="ior" className="py-24 bg-forest text-rice relative">
                    <div className="max-w-6xl mx-auto px-6 relative z-10">
                        <div className="text-center mb-16">
                            <h3 className="text-3xl font-serif font-bold text-gold mb-4">I.O.R 實戰成長飛輪</h3>
                            <div className="w-16 h-1 bg-clay mx-auto rounded-full mb-6"></div>
                            <p className="text-rice/80 max-w-2xl mx-auto leading-relaxed">
                                在職域所，學習不是百米衝刺，而是一場有人陪伴的馬拉松。我們為諮詢師打造專屬的支持系統。
                            </p>
                        </div>

                        <div className="grid md:grid-cols-3 gap-6">
                            <div className="border border-gold/30 p-8 rounded-xl bg-forest/50 hover:bg-forest transition-colors">
                                <h4 className="text-gold text-2xl font-serif font-bold mb-2">Input</h4>
                                <h5 className="text-xl font-bold text-rice mb-4">培力．進階職能學院</h5>
                                <p className="text-rice/70 text-sm leading-relaxed">
                                    充電站與視野望遠鏡，補足書本沒寫的真實觀點。從建立個人的諮詢風格，到拆解真實世界的棘手難題。
                                </p>
                            </div>
                            <div className="border border-clay/50 p-8 rounded-xl bg-forest/50 hover:bg-forest transition-colors relative">
                                <div className="absolute -top-3 -right-3 bg-clay text-rice text-xs font-bold px-3 py-1 rounded-full">核心價值</div>
                                <h4 className="text-clay text-2xl font-serif font-bold mb-2">Output</h4>
                                <h5 className="text-xl font-bold text-rice mb-4">實踐．實戰派案中心</h5>
                                <p className="text-rice/70 text-sm leading-relaxed">
                                    不敢跨出第一步？我們提供允許試錯的安全場域。從暖心實戰媒合到微課舞台，給你第一次接案的勇氣。
                                </p>
                            </div>
                            <div className="border border-rice/30 p-8 rounded-xl bg-forest/50 hover:bg-forest transition-colors">
                                <h4 className="text-rice text-2xl font-serif font-bold mb-2">Review</h4>
                                <h5 className="text-xl font-bold text-rice mb-4">覆盤．專業督導圈</h5>
                                <p className="text-rice/70 text-sm leading-relaxed">
                                    由 CDI 導師帶領團體督導與個案覆盤。用客觀視角幫你找出盲點、給予心理支持，確保你在助人路上穩健前行。
                                </p>
                            </div>
                        </div>
                    </div>
                </section>
            );
        };

        // --- 頁尾 Footer ---
        const Footer = () => {
            return (
                <footer className="bg-forest pt-16 pb-8 border-t border-rice/10">
                    <div className="max-w-6xl mx-auto px-6 text-rice">
                        <div className="grid md:grid-cols-2 gap-8 mb-12">
                            <div>
                                <h3 className="text-2xl font-serif font-bold text-gold mb-4">職域所 CRAFT hub</h3>
                                <p className="text-rice/70 text-sm leading-relaxed max-w-sm">
                                    讓實務底蘊，成為你執業路上的堅定導航。<br/>
                                    Deepen your craft, Amplify your impact.
                                </p>
                            </div>
                            <div className="md:text-right">
                                <h4 className="text-lg font-bold mb-4 text-clay">聯絡我們</h4>
                                <p className="text-rice/70 text-sm mb-2">客服信箱：service@crafthub.com</p>
                                <p className="text-rice/70 text-sm mb-4">社群關注：@CRAFTHUB</p>
                                <button className="border border-gold text-gold px-6 py-2 rounded-full text-sm hover:bg-gold hover:text-forest transition-colors">
                                    訂閱電子報
                                </button>
                            </div>
                        </div>
                        <div className="text-center text-rice/40 text-xs border-t border-rice/10 pt-8">
                            © 2026 職域所 CRAFT hub. All rights reserved. (原型展示版本)
                        </div>
                    </div>
                </footer>
            );
        };

        // --- 主程式進入點 ---
        const App = () => {
            return (
                <div className="min-h-screen flex flex-col font-sans">
                    <Navbar />
                    <main className="flex-grow">
                        <Hero />
                        <PainPoints />
                        <Flywheel />
                    </main>
                    <Footer />
                </div>
            );
        };

        // 渲染 React 應用
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
