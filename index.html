<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>職域所 CRAFT hub ｜ 讓助人者的專業微光，匯聚成塔</title>
  
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            forestGreen: '#2C4C3B',  // 深林綠：專業的厚度、沉穩、生長
            warmClay: '#C67C56',     // 陶土暖棕：土壤、手作工藝、人的溫度
            shimmerGold: '#E8C478',   // 微光金：初心、希望、點亮、微光
            riceWhite: '#F7F5F0',     // 米宣白：純粹、留白、暖灰紙底色
          },
          fontFamily: {
            serif: ['Noto Serif TC', 'Georgia', 'serif'],
            sans: ['Noto Sans TC', 'Inter', 'sans-serif'],
          }
        }
      }
    }
  </script>
  
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@600;900&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
  
  <style>
    body {
      background-color: #F7F5F0;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes scaleUp { from { opacity: 0; transform: scale(0.97); } to { opacity: 1; transform: scale(1); } }
    .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    .animate-scale-up { animation: scaleUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
  </style>
</head>
<body class="font-sans antialiased text-forestGreen selection:bg-shimmerGold/30">

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // 團隊初始化核心數據
    const TEAM_MEMBERS = [
      {
        id: 'tingyan',
        name: '蔡庭妍 (脆鹽 Crispyen)',
        title: '共同創辦人 / 品牌行銷 × 專案統籌',
        cert: 'CDI / CDA 國際雙證照職涯諮詢師 (累積 850+ 小時實務)',
        element: '「土」元素 (承載與包容)',
        bio: '從教育新創、海外留學到行銷專案管理，透過大量的嘗試與「刪去法」在變動中篩選出真正的熱情所在。正因為走過彎路，更擅長協助個案在混亂的選項中釐清思緒，將迷惘轉化為明確的下一步。',
        mascotName: '暖暖丘 (The Mound)',
        mascotDesc: '一座低矮、寬闊的小土丘。重心極低，給人絕對的安全感。身體線條圓潤、沒有稜角，總是靜靜地待在畫面下方讓夥伴倚靠，或在頭頂長出嫩芽。',
        mascotColor: '#C67C56'
      },
      {
        id: 'rake',
        name: '陳辰杰 (Rake)',
        title: '共同創辦人 / 商業拓展 × 教學賦能',
        cert: 'CDI 國際生涯發展導師 / 企業職涯策略顧問',
        element: '「木」元素 (生長與結構)',
        bio: '歷經企業人資、管理顧問與政府職涯發展計畫，長期專注於人才發展與職涯策略。擅長透過生涯發展方法協助諮詢師看見自身優勢、打磨專屬核心技能，並將助人專業轉化為高價值的市場影響力。',
        mascotName: '小木木 (Growy Tree)',
        mascotDesc: '一棵剛發芽的像素風小樹苗，代表發展與蛻變。它的樹幹會隨著團隊每次解鎖新里程碑而微微伸長，身上帶有淡淡的年輪痕跡，象徵專業實務需要時間慢工熟成。',
        mascotColor: '#2C4C3B'
      },
      {
        id: 'ben',
        name: '陳原本 (Ben)',
        title: '共同創辦人 / 營運策略 × 數位科技',
        cert: '外商銷售策略專家 / 數位產品架構師',
        element: '「光」元素 (指引與流動)',
        bio: '具備知名外商銷售策略、實習與跨國數位產品運作背景。在團隊中擔任「挑戰者」與技術轉譯橋樑的角色，致力於消除理論與實務的斷層，打造無邊界的數位共好生態圈與全方位 CRM 系統鏈結。',
        mascotName: '小微光 (Glimmer)',
        mascotDesc: '一團沒有固定外形、半透明的飄浮小光球，象徵初心與指引。它會在暗處微微發光，遇到不同卡點的夥伴時會貼心地變換顏色，凝聚起每一位助人工作者的微小光芒。',
        mascotColor: '#E8C478'
      }
    ];

    const MOCK_COURSES = [
      { id: 1, title: '諮詢室裡的冰山對話：敘事治療與焦點解決實戰班', instructor: '蔡庭妍 CDI', type: '進階專業課', date: '06/20 開始', credits: '12 CEP', fee: 4500 },
      { id: 2, title: '個人品牌 IP 打造：從零建立穩定精準的案源生態圈', instructor: '陳辰杰 CDI', type: '商業賦能課', date: '07/04 開始', credits: '8 CEP', fee: 5200 },
      { id: 3, title: '【每月賦能小聚】跨界諮詢師的失敗學與倫理覆盤個案沙龍', instructor: '全體導師組', type: '社群小聚', date: '07/18 舉辦', credits: '3 CEP', fee: 600 },
      { id: 4, title: '精準職涯牌卡實戰：從心理投射到解碼行動的高互動引引导學', instructor: '特邀海外專家', type: '專業工具課', date: '08/02 開始', credits: '6 CEP', fee: 3800 }
    ];

    const MOCK_PRACTITIONERS = [
      { id: 'p1', name: '林蔓 (Mandy)', tags: ['人資跨界', '科技業轉職', 'CDA持證'], hours: '120小時', rate: '★ 4.9', bio: '7年知名科技業高階HR，專精履歷盲點精準突破、模擬面試與轉職心理調適。', avatar: '👩‍💼' },
      { id: 'p2', name: '張宇哲 (Leo)', tags: ['新創行銷', '冒牌者症候群', 'SCPC'], hours: '95小時', rate: '★ 5.0', bio: '從設計師一路跨界到新創總監，擅長陪伴充滿焦慮的求職者長出核心底氣。', avatar: '👨‍💼' },
      { id: 'p3', name: '脆鹽 Crispyen', tags: ['國際雙證', '教育新創', '海外留學'], hours: '850+小時', rate: '★ 5.0', bio: '職域所共同創辦人，結合專案管理邏輯與行銷思維，溫暖且務實引導下一步。', avatar: '✨' }
    ];

    function App() {
      // 頁面與四端狀態管理
      const [activeTab, setActiveTab] = useState('home');
      const [currentUser, setCurrentUser] = useState(null);
      const [authMode, setAuthMode] = useState(null); 
      const [registerRole, setRegisterRole] = useState('learner');
      
      const [practitionersList, setPractitionersList] = useState(MOCK_PRACTITIONERS);
      const [userInbox, setUserInbox] = useState([]); 
      const [crmMessages, setCrmMessages] = useState([
        { sender: 'system', text: '🌱 嗨！歡迎來到職域所。我們是一群抱持職人精神的諮詢師。不論你是想探索生涯的卡點，或是剛拿到證照正經歷斷層焦慮的助人者，歡迎隨時跟我們聊聊！', time: '剛剛' }
      ]);
      const [isCrmOpen, setIsCrmOpen] = useState(false);
      const [crmInput, setCrmInput] = useState('');
      const [anonymousHistory, setAnonymousHistory] = useState(['訪問首頁']); 

      // 3層急速解碼器狀態
      const [quizTrack, setQuizTrack] = useState(null);
      const [quizStep, setQuizStep] = useState(0);
      const [quizAnswers, setQuizAnswers] = useState([]);
      const [quizResult, setQuizResult] = useState(null);

      // 續證學分缺口計算機狀態
      const [cepCourses, setCepCourses] = useState(24);
      const [cepSupervision, setCepSupervision] = useState(12);
      const [cepConsultations, setCepConsultations] = useState(15);

      // 微光陪跑保證金返還計量狀態
      const [taskProfile, setTaskProfile] = useState(false);
      const [taskCaseStudy, setTaskCaseStudy] = useState(false);
      const [taskSocialProof, setTaskSocialProof] = useState(false);
      const [taskVideo, setTaskVideo] = useState(false);

      const [pendingApprovals, setPendingApprovals] = useState([
        { email: 'test.coach@crafthub.com', name: '王大同', cert: 'CDA 證照持證1年', applyTime: '2026-06-02' }
      ]);

      const [bookingModal, setBookingModal] = useState(null);
      const [courseRegModal, setCourseRegModal] = useState(null);

      useEffect(() => {
        setAnonymousHistory(prev => [...prev, `切換分頁: ${activeTab}`]);
      }, [activeTab]);

      const sendVirtualEmail = (to, subject, contentHTML) => {
        setUserInbox(prev => [{
          id: Date.now(), to, subject, content: contentHTML, time: new Date().toLocaleTimeString()
        }, ...prev]);
      };

      const handleMockLogin = (email, password, isGoogle = false) => {
        if (isGoogle) {
          const mockUser = { email: 'google.user@gmail.com', name: '微光探索者', role: 'learner', uid: 'g-123' };
          setCurrentUser(mockUser);
          sendVirtualEmail(mockUser.email, '【職域所 CRAFT hub】Google 帳戶安全鏈結成功通知', `
            <h3>歡迎光臨職域所！</h3>
            <p>親愛的 ${mockUser.name} 您好：</p>
            <p>您已成功透過 Google 帳戶安全登入職域所全效型平台。您的匿名前世瀏覽軌跡已與此帳號進行「靈魂綁定」，我們將為您持續保留完整的客製化職涯探索紀錄與對話脈絡。</p>
          `);
          setAuthMode(null);
          return;
        }

        if (email === 'admin@crafthub.com') {
          setCurrentUser({ email, name: '營運總管 Ben', role: 'admin', uid: 'admin-000' });
          setAuthMode(null);
          return;
        }

        if (email.includes('coach')) {
          setCurrentUser({ email, name: '現役職人諮詢師', role: 'practitioner', status: 'approved', uid: 'p-777' });
        } else {
          setCurrentUser({ email, name: '常規成員', role: 'learner', uid: 'l-111' });
        }
        setAuthMode(null);
      };

      const handleMockRegister = (name, email, password) => {
        if (registerRole === 'learner') {
          setCurrentUser({ email, name, role: 'learner', uid: 'u-' + Date.now() });
          sendVirtualEmail(email, '【職域所 CRAFT hub】帳號註冊成功歡迎信', `<h3>歡迎來到職域所共好生態圈！</h3><p>親愛的 ${name} 夥伴：很高興看見你邁出這一步。</p>`);
        } else {
          setCurrentUser({ email, name, role: 'practitioner', status: 'pending', uid: 'p-' + Date.now() });
          setPendingApprovals(prev => [...prev, { email, name, cert: '申請持證諮詢師資格', applyTime: new Date().toLocaleDateString() }]);
          sendVirtualEmail(email, '【職域所】註冊成功，諮詢師執業資格專案審核中', `<h3>收到您的職人入所申請！</h3><p>持證夥伴 ${name} 您好：我們正在為您人工覆盤覆核資格。</p>`);
        }
        setAuthMode(null);
      };

      const approvePractitioner = (emailToApprove) => {
        setPendingApprovals(prev => prev.filter(item => item.email !== emailToApprove));
        sendVirtualEmail(emailToApprove, '🎉【職域所 CRAFT hub】恭喜！您的持證諮詢師執業審核已通過', `<p>您的 B 端獨立後台儀表板已正式解鎖，您現在可以正式加盟前台專家名冊！</p>`);
        if (currentUser && currentUser.email === emailToApprove) {
          setCurrentUser(prev => ({ ...prev, status: 'approved' }));
        }
        setPractitionersList(prev => [
          ...prev,
          { id: 'p-' + Date.now(), name: emailToApprove.split('@')[0], tags: ['考核通過', '專業更換中'], hours: '0小時', rate: '★ 5.0', bio: '職域所核准精銳諮詢師，深具專業底蘊。', avatar: '✨' }
        ]);
      };

      const handleCrmSend = (e) => {
        e.preventDefault();
        if (!crmInput.trim()) return;
        setCrmMessages(prev => [...prev, { sender: 'user', text: crmInput, time: '剛剛' }]);
        const txt = crmInput;
        setCrmInput('');

        setTimeout(() => {
          let reply = "收到您的訊息！我們的核心創辦團隊（庭妍、Rake、Ben）已收到您的諮詢提問，會將您的前世瀏覽軌跡一併帶入。請問您目前最想了解的是微光孵化陪跑計畫，還是想預約 1 對 1 的諮詢呢？";
          if (txt.includes('學分') || txt.includes('換證')) reply = "換證學分是大家共同的痛點！職域所的課程與同儕督導皆可對接繼續教育學分（CEP）缺口認證。你可以利用計畫介紹頁面的學分計算機預算盲點！";
          setCrmMessages(prev => [...prev, { sender: 'system', text: reply, time: '剛剛' }]);
        }, 600);
      };

      const START_QUIZ = (track) => {
        setQuizTrack(track); setQuizStep(1); setQuizAnswers([]); setQuizResult(null);
      };

      const NEXT_QUIZ_STEP = (weight) => {
        const updated = [...quizAnswers, weight];
        setQuizAnswers(updated);
        if (quizStep < 5) {
          setQuizStep(quizStep + 1);
        } else {
          if (quizTrack === 'explorer') {
            setQuizResult({
              title: updated.filter(a => a==='A').length >= 3 ? '【定位模糊的起步遊俠】' : '【高內耗的深海潛水員】',
              desc: '你在生涯發展中正面臨特定卡點。不需要盲目去上包裝精緻的雞湯課，你需要的是透過行銷思維的「刪去法」與專案管理邏輯提煉出精準的第一步。',
              cta: '建議立即到「諮詢師在線」頁面預約 1對1 的 50分鐘 職引者導航對話。'
            });
          } else {
            setQuizResult({
              title: updated.filter(a => a==='A').length >= 3 ? '【持證新手之死亡之谷卡關者】' : '【資格到期前的 CEP 學分焦慮行者】',
              desc: '拿到證照上面對真實個案，容易卡在懂理論卻不敢接案、不敢收費的斷層。你目前最急需的是安全的個案淬煉、資深導師的督導與同儕支持網。',
              cta: '【微光孵化】實戰陪跑計畫就是為你量身打造的！建議立即拉到下方查看保證金任務。'
            });
          }
          setQuizStep(0);
        }
      };

      const MOCK_QUIZ_QUESTIONS = {
        explorer: [
          { q: "當你面對下一個職涯十字路口，你最常浮現的內心獨白是？", options: [{ t: "不知道自己要什麼，害怕選錯走彎路", w: "A" }, { t: "知道有些方向，但本業跟副業精疲力竭，卡在時間換錢陷阱", w: "B" }] },
          { q: "如果要把你目前的迷惘狀態具象化，它更像哪種情境？", options: [{ t: "滿腦子的毛線球，理不出頭緒與明確下一步", w: "A" }, { t: "一座快要熄滅的微光，缺乏長遠的影響力擴散藍圖", w: "B" }] },
          { q: "你過往面對迷惘最常見的處理方式是？", options: [{ t: "瘋狂收集課程與考證照，尋求外部安全感", w: "A" }, { t: "自己默默忍受與內耗，陷入日常常規的消磨", w: "B" }] },
          { q: "若此時有一位資深職人夥伴坐在你對面，你希望他具備什麼風格？", options: [{ t: "幫你用專案管理邏輯釐清混亂、給出務實行動線索", w: "A" }, { t: "給予深度的教練式引導、不講大道理只講生存底氣", w: "B" }] },
          { q: "你認為一場真正有價值的諮詢，最核心的收穫應該是？", options: [{ t: "一份清晰的下一步策略實戰地圖", w: "A" }, { t: "看見自己冰山下的優勢本質，與承接生命的能量", w: "B" }] }
        ],
        practitioner: [
          { q: "拿到諮詢相關專業證照後，你目前執業上面臨最大的痛點是？", options: [{ t: "懂理論工具，但面對真實個案卡情緒或不敢收費", w: "A" }, { t: "缺乏穩定的曝光渠道與獲客案源，不知道去哪找個案", w: "B" }] },
          { q: "當您在諮詢室遇到棘手或卡關的個案時，您的真實狀態是？", options: [{ t: "感到孤單、自我懷疑（冒牌者症候群發作），無前輩討論", w: "A" }, { t: "知道怎麼處理，但覺得諮詢模式太耗時間，想開發多元進階課", w: "B" }] },
          { q: "對於「三年 120 學分」的繼續教育（CEP）續證規範，您的感受是？", options: [{ t: "非常焦慮，覺得取得管道不清楚且流程繁瑣耗時", w: "A" }, { t: "還算了解，但希望能有一站式自動統計學分的儀表板", w: "B" }] },
          { q: "你認為要從持證新手蛻變為能獨當一面的專家，最缺的是什麼？", options: [{ t: "允許試錯的安全場域，加上資深導師的 1對1 督導覆盤", w: "A" }, { t: "個人 IP 個人品牌商業賦能與大專院校、校園提案的連結", w: "B" }] },
          { q: "職域所倡導「諮詢是需要時間熟成的工藝」，這句話對你的觸動是？", options: [{ t: "直擊心靈，我對承接生命有敬畏心，不想追求速成過度包裝", w: "A" }, { t: "認同，我希望加入聯合事務所，告別單打獨鬥的生態圈", w: "B" }] }
        ]
      };

      const totalCep = parseInt(cepCourses||0) + parseInt(cepSupervision||0)*2 + parseInt(cepConsultations||0)*1.5;

      return (
        <div className="min-h-screen flex flex-col justify-between">
          
          {/* Persistent Sticky Navigation Header Navbar */}
          <header className="sticky top-0 z-50 border-b border-forestGreen/10 backdrop-blur-md bg-riceWhite/90 h-20">
            <div className="max-w-7xl mx-auto px-4 h-full flex items-center justify-between">
              <div className="flex items-center space-x-3 cursor-pointer" onClick={() => setActiveTab('home')}>
                <div className="h-11 w-11 rounded-xl bg-forestGreen flex items-center justify-center p-2 border border-shimmerGold/40 shadow-sm">
                  <svg viewBox="0 0 100 100" fill="none" className="w-full h-full">
                    <path d="M50 15 L25 80 L75 80 Z" stroke="#E8C478" strokeWidth="6" strokeLinecap="round" strokeLinejoin="round" />
                    <circle cx="50" cy="40" r="8" fill="#C67C56" />
                    <path d="M15 80 Q50 90 85 80" stroke="#E8C478" strokeWidth="4" />
                  </svg>
                </div>
                <div>
                  <span className="font-serif font-bold text-lg block text-forestGreen">職域所</span>
                  <span className="text-[10px] uppercase tracking-widest font-mono text-warmClay -mt-1 block">CRAFT hub</span>
                </div>
              </div>

              <nav className="hidden md:flex space-x-1">
                {[
                  { id: 'home', label: '首頁' },
                  { id: 'brand', label: '創辦人與吉祥物' },
                  { id: 'program', label: '微光實戰陪跑' },
                  { id: 'courses', label: '專業進階課' },
                  { id: 'directory', label: '諮詢師在線' },

                      activeTab === tab.id ? 'bg-forestGreen text-riceWhite shadow-sm' : 'text-forestGreen/80 hover:bg-forestGreen/5'

                  </button>
                ))}
              </nav>

                {currentUser ? (
                  <div className="flex items-center space-x-2">
                    <span className="text-xs font-medium hidden sm:inline">{currentUser.name}</span>
                    <button onClick={() => setCurrentUser(null)} class="text-xs px-2.5 py-1.5 border border-warmClay text-warmClay rounded-md hover:bg-warmClay/5">登出</button>
                  </div>
                ) : (
                  <button onClick={() => setAuthMode('login')} className="text-xs px-4 py-2 bg-forestGreen text-riceWhite rounded-lg font-medium hover:bg-forestGreen/90 shadow-sm">登入 / 註冊</button>
                )}
              </div>
            </div>
          </header>

          {/* Virtual Mail Container */}
          {userInbox.length > 0 && (
            <div className="bg-shimmerGold/10 border-b border-shimmerGold/30 px-4 py-2 text-xs text-center">

              <span className="text-forestGreen/80"> 標題: {userInbox[0].subject} ({userInbox[0].time}) </span>
              <button onClick={() => alert(userInbox[0].content.replace(/<[^>]*>/g, ''))} className="underline text-warmClay font-bold ml-2">查閱信件正文</button>
            </div>
          )}

            {/* HOME VIEW */}
            {activeTab === 'home' && (
              <div className="space-y-16 animate-fade-in">
                <div className="text-center max-w-3xl mx-auto space-y-6 pt-6">
                  <div className="inline-flex items-center space-x-2 px-3 py-1 bg-forestGreen/5 rounded-full text-xs font-medium border border-forestGreen/10">
                    <span className="h-1.5 w-1.5 rounded-full bg-warmClay"></span>
                    <span>2026 啟動新創品牌正式上線</span>

                    我們不追求快餐速成，也不教虛浮包裝。職域所是一所專為職涯助人者打造的實戰維護與換證續證深度加速行會。

                {/* 4 Cards Grid */}
                <div className="grid grid-cols-1 md:grid-cols-4 gap-6">

                      <h3 className="font-serif font-bold text-base">{txt}</h3>
                      <p className="text-xs text-forestGreen/70 font-light">面對多變市場，協助突破取得證照後不敢收費或即將到期的死亡斷層。</p>

                {/* Question Section */}
                <div id="quiz-anchor" className="bg-forestGreen text-riceWhite rounded-3xl p-8 sm:p-12 shadow-xl relative overflow-hidden">
                  <div className="max-w-2xl mx-auto space-y-6">

                      <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 pt-4">

                          <h4 className="text-sm font-bold text-shimmerGold">個人生涯探索者 ➔</h4>
                          <p className="text-xs text-riceWhite/70 font-light mt-1">正面臨求職、轉職迷惘，想突破盲點的民眾或學生。</p>
                        </button>
                        <button onClick={() => START_QUIZ('practitioner')} className="p-5 rounded-xl border border-shimmerGold/30 bg-riceWhite/5 text-left hover:border-shimmerGold transition-all">
                          <h4 className="text-sm font-bold text-shimmerGold">諮詢工作者 / 助人新手 ➔</h4>
                          <p className="text-xs text-riceWhite/70 font-light mt-1">已取得證照，面臨執業斷層或學分續證焦慮者。</p>
                        </button>
                      </div>
                    )}

                    {quizStep > 0 && (
                      <div className="space-y-4">
                        <div className="flex justify-between text-xs text-shimmerGold/80 font-mono">
                          <span>軌道：{quizTrack === 'explorer' ? '生涯探索' : '助人工作者'}</span>
                          <span>進度：{quizStep} / 5</span>
                        </div>
                        <h3 className="text-base font-medium leading-relaxed">{MOCK_QUIZ_QUESTIONS[quizTrack][quizStep - 1].q}</h3>

                            <button key={oIdx} onClick={() => NEXT_QUIZ_STEP(opt.w)} className="w-full text-left p-3.5 rounded-xl border border-riceWhite/10 bg-riceWhite/5 hover:bg-riceWhite/10 text-xs leading-relaxed transition-all">
                              {opt.t}
                            </button>
                          ))}
                        </div>
                      </div>
                    )}

                    {quizResult && (

                        <p className="text-xs font-light border-l-2 border-warmClay pl-3 leading-relaxed text-forestGreen/90">{quizResult.desc}</p>
                        <p className="text-xs bg-shimmerGold/20 p-3 rounded-lg font-medium">🚀 <strong>行動線索：</strong>{quizResult.cta}</p>

                      </div>
                    )}
                  </div>
                </div>
              </div>
            )}

            {/* BRAND STORY VIEW */}
            {activeTab === 'brand' && (
              <div className="space-y-12 animate-fade-in">

                </div>

                <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                  {TEAM_MEMBERS.map(member => (
                    <div key={member.id} className="bg-white rounded-2xl border border-forestGreen/10 overflow-hidden shadow-sm flex flex-col justify-between">
                      <div className="p-6 space-y-4">
                        <div>
                          <span className="text-[10px] font-mono font-bold text-warmClay block">{member.element}</span>
                          <h3 className="text-lg font-serif font-bold mt-0.5">{member.name}</h3>
                          <p className="text-xs font-medium text-forestGreen/90">{member.title}</p>
                          <p className="text-[10px] text-forestGreen/50 italic font-light">{member.cert}</p>
                        </div>
                        <p className="text-xs text-forestGreen/80 leading-relaxed font-light bg-riceWhite p-3 rounded-xl">{member.bio}</p>
                      </div>
                      <div className="p-5 border-t border-forestGreen/5 bg-riceWhite/50 space-y-2">

                        <p className="text-[11px] text-forestGreen/70 leading-relaxed font-light">{member.mascotDesc}</p>
                      </div>
                    </div>
                  ))}
                </div>
              </div>

                    <p className="text-xs text-riceWhite/80 font-light leading-relaxed">我們透過培力(Input)、允許試錯的安全派案實踐(Output)與資深督導覆盤(Review)，建立完整的支持系統。</p>

                  <div className="bg-riceWhite/5 border border-riceWhite/10 rounded-2xl p-5 space-y-3 text-xs">

                        ['task3', '公開社群心得見證 2 篇', taskSocialProof, setTaskSocialProof],
                        ['task4', '錄製 1 分鐘結業反思短影音', taskVideo, setTaskVideo]].map(([id, label, val, setVal], idx) => (
                        <label key={idx} className="flex items-center space-x-2 cursor-pointer bg-riceWhite/5 p-2 rounded">

                        </label>
                      ))}
                    </div>
                    <div className="border-t border-riceWhite/10 pt-2 flex justify-between text-xs font-mono">
                      <span>已達成退還款額度：</span>
                      <span className="text-shimmerGold font-bold text-base">${((taskProfile?1:0)+(taskCaseStudy?1:0)+(taskSocialProof?1:0)+(taskVideo?1:0))*1000}</span>

                  </div>
                </div>

                    <p className="text-xs text-forestGreen/60">NCDA / PAC 規範三年需滿 120 學分</p>
                  </div>
                  <div className="space-y-4 text-xs">

                      <div className="flex justify-between mb-1"><span>1. 專業進階授課時數 (1小時 = 1學分)</span><span className="font-mono text-warmClay">{cepCourses} 分</span></div>
                      <input type="range" min="0" max="80" value={cepCourses} onChange={(e)=>setCepCourses(e.target.value)} className="w-full accent-warmClay" />
                    </div>
                    <div>
                      <div className="flex justify-between mb-1"><span>2. 團體/個別督導時數 (1小時 = 2學分)</span><span className="font-mono text-warmClay">{cepSupervision * 2} 分</span></div>
                      <input type="range" min="0" max="40" value={cepSupervision} onChange={(e)=>setCepSupervision(e.target.value)} className="w-full accent-warmClay" />
                    </div>
                    <div className="bg-riceWhite p-4 rounded-xl flex justify-between items-center">
                      <div><span className="text-[10px] text-forestGreen/50 block">累計已得學分</span><span className="text-2xl font-bold font-serif">{totalCep}</span><span className="text-[10px] text-forestGreen/40"> / 120</span></div>
                      <div className="text-right">
                        <span className="text-[10px] text-forestGreen/50 block">剩餘換證缺口</span>
                        <span className="text-xl font-bold text-warmClay">{120 - totalCep <= 0 ? '🎉 已符合換證規範' : `${120 - totalCep} 學分`}</span>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            )}

            {/* COURSES VIEW */}
            {activeTab === 'courses' && (
              <div className="space-y-6 animate-fade-in">
                <div className="border-b border-forestGreen/10 pb-4">
                  <h2 className="text-xl font-serif font-bold">專業進階學院與共學小聚</h2>
                  <p className="text-xs text-forestGreen/60 font-light">引領職涯助人者的深度觀點媒體 暨 進階實戰加速器。</p>

                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">

                    <div key={course.id} className="bg-white border border-forestGreen/5 rounded-xl p-5 shadow-sm flex flex-col justify-between">
                      <div className="space-y-2">
                        <div className="flex justify-between text-[10px]">
                          <span className="bg-forestGreen/5 px-2 py-0.5 rounded font-medium">{course.type}</span>

                      <div className="border-t border-forestGreen/5 pt-3 mt-4 flex justify-between items-center">
                        <span className="text-xs font-mono font-bold">${course.fee} 元</span>
                        <button onClick={()=>setCourseRegModal(course)} className="px-3 py-1 bg-forestGreen text-riceWhite rounded text-xs">預約席位</button>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* PRACTITIONER DIRECTORY VIEW */}
            {activeTab === 'directory' && (
              <div className="space-y-6 animate-fade-in">
                <div className="text-center max-w-xl mx-auto space-y-1">
                  <h2 className="text-xl font-serif font-bold">職域所持證專家名冊</h2>
                  <p className="text-xs text-forestGreen/60">「來到職域所，找我們這群抱持職人精神的諮詢師就對了！」</p>
                </div>
                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                  {practitionersList.map(item => (
                    <div key={item.id} className="bg-white rounded-xl border border-forestGreen/10 p-5 shadow-sm flex flex-col justify-between space-y-4">
                      <div className="space-y-2">
                        <div className="flex items-center space-x-3">
                          <div className="h-10 w-10 bg-riceWhite rounded-lg flex items-center justify-center text-xl shadow-inner">{item.avatar}</div>
                          <div>
                            <h4 className="text-sm font-bold font-serif">{item.name}</h4>
                            <span className="text-[10px] text-warmClay font-mono">{item.hours} ｜ {item.rate}</span>
                          </div>
                        </div>
                        <p className="text-xs text-forestGreen/80 font-light leading-relaxed">{item.bio}</p>
                      </div>
                      <button onClick={()=>setBookingModal(item)} className="w-full py-2 border border-forestGreen/20 rounded-lg text-xs hover:bg-forestGreen hover:text-riceWhite transition-all">1對1 深度媒合預約</button>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* BENEFITS VIEW */}
            {activeTab === 'benefits' && (
              <div className="space-y-6 max-w-2xl mx-auto animate-fade-in">
                <div className="text-center border-b border-forestGreen/10 pb-4">
                  <h2 className="text-xl font-serif font-bold">為什麼要在這裡打磨諮詢手藝？</h2>
                  <p className="text-xs text-forestGreen/60 font-light">聽聽過往走過證照後斷層、在職域所建立執業底氣的夥伴心聲。</p>
                </div>
                <div className="space-y-4">
                  <div className="bg-white p-5 rounded-xl border border-forestGreen/5 space-y-2 text-xs font-light">
                    <strong className="text-warmClay block font-medium">✦ 跨界諮詢師 廖小姐：</strong>
                    <p className="text-forestGreen/70">剛取證時手握大把工具理論，但面對真實個案的眼淚時手足無措。加入微光孵化計畫後，在導師 1對1 個案覆盤督導下解開卡點，目前已成功跨出付費執業的第一步！</p>
                  </div>
                </div>
              </div>
            )}

            {/* Pending Lounge Box */}
            {currentUser && currentUser.role === 'practitioner' && currentUser.status === 'pending' && (
              <div className="mt-12 bg-white border-2 border-dashed border-warmClay rounded-2xl p-6 text-xs space-y-3 animate-scale-up">
                <h4 className="font-serif font-bold text-sm text-warmClay">⏳ 諮詢師加盟資格人工審核大廳 (B端)</h4>
                <p className="text-forestGreen/80 font-light">您好，由於職域所定位為專業行會，新註冊諮詢師需經由後台管理員進行人工資歷覆盤審核。若您不小心選錯身分，可使用下方救援鈕進行身分重設。</p>
                <button onClick={()=>{
                  setCurrentUser({...currentUser, role: 'learner', status: undefined});
                  sendVirtualEmail(currentUser.email, '身分重設成功', '已切換為常規成員。');
                }} className="px-3 py-1.5 bg-warmClay text-white rounded font-medium">🎛️ 觸發「時空倒流鈕」身分救援</button>
              </div>
            )}

          </main>

          {/* Footer Component Layout */}
          <footer className="bg-forestGreen text-riceWhite border-t border-shimmerGold/10 py-12 mt-20 text-xs font-light">

              <div className="space-y-2">
                <h4 className="font-serif font-bold text-sm text-shimmerGold">職域所 CRAFT hub</h4>
                <p className="text-riceWhite/70 leading-relaxed">我們致力於消除理論學習與市場執業之間的斷層，打造讓助人者能安心執業、獲得合理回報的共好生態圈。</p>
              </div>
              <div>
                <h4 className="font-serif font-bold text-sm text-shimmerGold mb-2">快速分流</h4>
                <ul className="space-y-1.5 text-riceWhite/80">
                  <li><button onClick={()=>setActiveTab('home')} className="hover:text-white">回首頁 & 互動解碼</button></li>
                  <li><button onClick={()=>setActiveTab('program')} className="hover:text-white">微光實戰陪跑計畫</button></li>
                </ul>
              </div>
              <div className="space-y-1">
                <h4 className="font-serif font-bold text-sm text-shimmerGold">聯絡我們</h4>
                <p>電子信箱：service@crafthub.com</p>
                <p className="text-[10px] text-riceWhite/40 pt-1">© 2026 職域所 CRAFT hub. All rights reserved.</p>
              </div>
            </div>
          </footer>

          {/* CRM floating window */}
          <div className="fixed bottom-6 right-6 z-50">
            {isCrmOpen ? (
              <div className="w-80 sm:w-96 bg-white border border-forestGreen/20 rounded-2xl shadow-2xl flex flex-col overflow-hidden animate-scale-up text-xs">
                <div className="bg-forestGreen text-riceWhite p-4 flex justify-between items-center">
                  <div>
                    <h4 className="font-bold text-shimmerGold">職域所線上助理在線</h4>
                    <p className="text-[10px] text-riceWhite/60">CRM 前世瀏覽軌跡已綁定</p>
                  </div>
                  <button onClick={()=>setIsCrmOpen(false)} className="text-sm font-bold">✕</button>
                </div>
                <div className="p-4 h-64 overflow-y-auto space-y-3 bg-riceWhite/40">
                  {crmMessages.map((msg, i) => (
                    <div key={i} className={`flex ${msg.sender === 'user' ? 'justify-end' : 'justify-start'}`}>
                      <div className={`p-2.5 rounded-xl max-w-[85%] leading-relaxed ${msg.sender === 'user' ? 'bg-warmClay text-white' : 'bg-white border border-forestGreen/5'}`}>
                        {msg.text}
                      </div>
                    </div>
                  ))}
                </div>
                <form onSubmit={handleCrmSend} className="p-3 border-t flex items-center space-x-2 bg-white">
                  <input type="text" value={crmInput} onChange={(e)=>setCrmInput(e.target.value)} placeholder="輸入您的提問（如：續證、陪跑費用）..." className="flex-1 bg-riceWhite rounded-lg p-2 border-0 text-xs focus:ring-1 focus:ring-forestGreen" />
                  <button type="submit" className="px-3 py-2 bg-forestGreen text-white rounded-lg font-medium">送出</button>
                </form>
              </div>
            ) : (
              <button onClick={()=>setIsCrmOpen(true)} className="h-14 w-14 bg-warmClay text-white rounded-full flex items-center justify-center shadow-xl font-bold text-lg border border-shimmerGold/40 animate-bounce">💬</button>
            )}
          </div>

          {/* Modal Popups */}
          {authMode && (
            <div className="fixed inset-0 z-50 bg-forestGreen/60 backdrop-blur-sm flex items-center justify-center p-4">
              <div className="bg-riceWhite rounded-2xl max-w-sm w-full p-6 relative shadow-2xl space-y-4 text-xs">
                <button onClick={()=>setAuthMode(null)} className="absolute top-4 right-4 text-sm font-bold">✕</button>
                <h3 className="text-base font-serif font-bold text-center">{authMode === 'login' ? '歡迎回到 職域所' : '加入行會共好圈'}</h3>
                
                {authMode === 'register' && (
                  <div className="flex bg-forestGreen/5 p-1 rounded-lg text-center font-medium">
                    <button onClick={()=>setRegisterRole('learner')} className={`flex-1 py-1 rounded ${registerRole==='learner'?'bg-forestGreen text-white':''}`}>學員 (C端)</button>
                    <button onClick={()=>setRegisterRole('practitioner')} className={`flex-1 py-1 rounded ${registerRole==='practitioner'?'bg-forestGreen text-white':''}`}>持證諮詢師 (B端)</button>
                  </div>
                )}

                <form onSubmit={(e)=>{
                  e.preventDefault();
                  const fd = new FormData(e.target);
                  if(authMode === 'login') handleMockLogin(fd.get('email'), fd.get('pass'));
                  else handleMockRegister(fd.get('name'), fd.get('email'), fd.get('pass'));
                }} className="space-y-3">
                  {authMode==='register' && (
                    <div><label className="font-medium block mb-0.5">真實姓名</label><input required name="name" type="text" class="w-full p-2 rounded border border-forestGreen/10" /></div>
                  )}
                  <div><label className="font-medium block mb-0.5">電子郵件 (輸入 admin@crafthub.com 體驗最高管理端)</label><input required name="email" type="email" class="w-full p-2 rounded border border-forestGreen/10" /></div>
                  <div><label className="font-medium block mb-0.5">密碼</label><input required name="pass" type="password" class="w-full p-2 rounded border border-forestGreen/10" /></div>
                  <button type="submit" className="w-full py-2 bg-forestGreen text-white rounded-lg font-bold">確認送出</button>
                </form>

                <div className="relative flex items-center justify-center my-2 text-[10px] font-mono text-forestGreen/30">
                  <div className="absolute w-full border-t"></div><span class="relative bg-riceWhite px-2">OR</span>
                </div>
                <button onClick={()=>handleMockLogin('','',true)} className="w-full py-2 bg-white border rounded-lg hover:bg-forestGreen/5 transition-all">🌐 使用 Google 帳戶一鍵登入</button>

                <div className="text-center pt-2">
                  {authMode==='login' ? <p>尚未加入？ <button onClick={()=>setAuthMode('register')} className="text-warmClay font-bold underline">立即註冊</button></p> : <p>已有帳號？ <button onClick={()=>setAuthMode('login')} className="text-warmClay font-bold underline">返回登入</button></p>}
                </div>
              </div>
            </div>
          )}

          {bookingModal && (
            <div className="fixed inset-0 z-50 bg-forestGreen/60 backdrop-blur-sm flex items-center justify-center p-4">
              <div className="bg-white rounded-xl p-6 max-w-sm w-full space-y-4 text-xs">
                <h3 className="font-serif font-bold text-sm">確認預約對話</h3>
                <p>您即將向 <strong>{bookingModal.name} 老師</strong> 提交工單預約，系統已自動將您目前的卡點歷程與對話記錄轉譯並與諮詢師同步對接。</p>
                <div className="flex space-x-2 pt-2">
                  <button onClick={()=>setBookingModal(null)} className="flex-1 py-2 bg-riceWhite rounded">取消</button>
                  <button onClick={()=>{alert('🎉 預約工單已順利送出！諮詢師將於 24 小時內發送視訊對談連結。'); setBookingModal(null);}} className="flex-1 py-2 bg-warmClay text-white rounded font-bold">確認提交</button>
                </div>
              </div>
            </div>
          )}

          {courseRegModal && (
            <div className="fixed inset-0 z-50 bg-forestGreen/60 backdrop-blur-sm flex items-center justify-center p-4">
              <div className="bg-white rounded-xl p-6 max-w-sm w-full space-y-4 text-xs">
                <h3 className="font-serif font-bold text-sm">確認報名進修席位</h3>
                <p>課程名稱：<strong>{courseRegModal.title}</strong></p>
                <p>預計取得權重：<span className="text-warmClay font-mono font-bold">{courseRegModal.credits}</span></p>
                <div className="flex space-x-2 pt-2">
                  <button onClick={()=>setCourseRegModal(null)} className="flex-1 py-2 bg-riceWhite rounded">返回</button>
                  <button onClick={()=>{alert(`🎉 報名扣款成功！預期換證積分已安全鎖定。`); setCourseRegModal(null);}} className="flex-1 py-2 bg-forestGreen text-white rounded font-bold">確認預約</button>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    const root = banknotes =组件;
    const container = document.getElementById('root');
    const reactRoot =组件 || ReactDOM.createRoot(container);
    reactRoot.render(<App />);
  </script>
</body>
</html>
